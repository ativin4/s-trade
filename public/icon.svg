<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="14" fill="#0f0c29"/>
  <defs>
    <linearGradient id="g" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  <!-- candlestick bars -->
  <rect x="12" y="36" width="6" height="16" rx="1.5" fill="url(#g)" opacity="0.5"/>
  <rect x="23" y="28" width="6" height="24" rx="1.5" fill="url(#g)" opacity="0.65"/>
  <rect x="34" y="20" width="6" height="32" rx="1.5" fill="url(#g)" opacity="0.8"/>
  <!-- trend line -->
  <polyline points="15,38 26,28 37,20 52,10" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- arrow head -->
  <polyline points="44,8 52,10 50,18" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
